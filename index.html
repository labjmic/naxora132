            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            font-size: 4rem;
            font-weight: 900;
            color: #38bdf8;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
            animation: introAnim 2s ease-in-out forwards;
            opacity: 0;
        }
        @keyframes introAnim {
            0% { opacity: 0; transform: scale(0.8); letter-spacing: 5px; }
            50% { opacity: 1; transform: scale(1.1); letter-spacing: 15px; }
            100% { opacity: 1; transform: scale(1); letter-spacing: 12px; }
        }

        /* ജനറൽ സ്റ്റൈൽ */
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; margin: 0; text-align: center; }
        header { padding: 40px 20px; background: linear-gradient(135deg, #1e293b, #0f172a); }
        .logo { font-size: 3rem; font-weight: 900; letter-spacing: 8px; color: #38bdf8; }
        
        .nav-buttons { margin: 0; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); padding: 15px; z-index: 1000; border-bottom: 1px solid #1e293b; backdrop-filter: blur(10px); }
        .nav-btn { background: #1e293b; color: #38bdf8; border: 2px solid #38bdf8; padding: 10px 25px; margin: 5px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: #38bdf8; color: #0f172a; }
        
        .container { max-width: 1100px; margin: auto; padding: 20px; min-height: 80vh; }
        
        /* അഡ്മിൻ പാനൽ സ്റ്റൈൽ */
        .admin-only { display: none; background: #1e293b; padding: 20px; border-radius: 12px; border: 2px dashed #38bdf8; max-width: 500px; margin: 20px auto; }
        .input-field { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; }
        
        .btn { background: #38bdf8; color: #0f172a; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* ബട്ടണുകൾ */
        .admin-controls { margin-top: 10px; display: none; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; margin-right: 5px; font-size: 0.8rem; }
        .btn-rename { background: #f59e0b; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        .search-bar { width: 80%; padding: 15px; margin: 20px 0; border-radius: 30px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; text-align: center; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .media-box { background: #1e293b; padding: 15px; border-radius: 15px; border: 1px solid #334155; transition: 0.3s; position: relative; }
        .media-box img, .media-box video { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .file-name-display { font-weight: bold; color: #38bdf8; display: block; margin-top: 12px; font-size: 1.1rem; }
        
        .content-section { display: none; animation: fadeIn 0.5s; } 
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .admin-login-btn { position: fixed; bottom: 15px; right: 15px; font-size: 0.75rem; color: #334155; cursor: pointer; border: none; background: transparent; opacity: 0.6; }
    </style>

<body>

    <div id="loader">
        <div class="loader-text">NAXORA</div>
    </div>

    <header>
        <div class="logo">NAXORA</div>
        <p style="color: #94a3b8;">Creative Visual Portfolio</p>
    </header>

    <div class="nav-buttons">
        <button class="nav-btn active" onclick="showSection('home', this)">HOME</button>
        <button class="nav-btn" onclick="showSection('photos', this)">PHOTOS</button>
        <button class="nav-btn" onclick="showSection('videos', this)">VIDEOS</button>
    </div>

    <div class="container">
        <div id="home" class="content-section active-section">
            <div style="background: #1e293b; padding: 50px 20px; border-radius: 20px; border: 1px solid #334155; margin-top: 20px;">
                <h2 style="color: #38bdf8;">Welcome to Naxora</h2>
                <p style="font-size: 1.2rem; line-height: 1.6; color: #cbd5e1;">Professional Portfolio Management</p>
            </div>
        </div>

        <div id="photos" class="content-section">
            <div id="adminPhoto" class="admin-only">
                <h4>Upload Photo</h4>
                <input type="text" id="photoName" class="input-field" placeholder="Title">
                <input type="file" id="photoInput" accept="image/*" class="input-field">
                <button class="btn" onclick="uploadMedia('photo')">Add Photo</button>
            </div>
            <input type="text" id="photoSearch" class="search-bar" placeholder="Search Photos..." onkeyup="filterMedia('photo')">
            <div class="gallery" id="photoGallery"></div>
        </div>

        <div id="videos" class="content-section">
            <div id="adminVideo" class="admin-only">
                <h4>Upload Video</h4>
                <input type="text" id="videoName" class="input-field" placeholder="Title">
                <input type="file" id="videoInput" accept="video/*" class="input-field">
                <button class="btn" onclick="uploadMedia('video')">Add Video</button>
            </div>
            <input type="text" id="videoSearch" class="search-bar" placeholder="Search Videos..." onkeyup="filterMedia('video')">
            <div class="gallery" id="videoGallery"></div>
        </div>
    </div>

    <button class="admin-login-btn" onclick="adminLogin()">Admin Access</button>

    <script>
        let isAdminActive = false;

        window.onload = function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            }, 2500);
            loadFromStorage();
        };

        function adminLogin() {
            const password = prompt("Admin Password:");
            if (password === "naxora2525") {
                isAdminActive = true;
                updateAdminUI();
            }
        }

        function updateAdminUI() {
            if (isAdminActive) {
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.admin-controls').forEach(el => el.style.display = 'block');
            }
        }

        function showSection(sectionId, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active-section');
            btn.classList.add('active');
            updateAdminUI();
        }

        function uploadMedia(type) {
            const nameInput = document.getElementById(type + 'Name');
            const fileInput = document.getElementById(type + 'Input');
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newItem = { id: Date.now(), type: type, name: nameInput.value || "Untitled", src: e.target.result };
                    displayMedia(newItem);
                    saveToStorage(newItem);
                    nameInput.value = ''; fileInput.value = '';
                };
                reader.readAsDataURL(fileInput.files[0]);
            }
        }

        function displayMedia(item) {
            const gallery = document.getElementById(item.type + 'Gallery');
            if (!gallery) return;
            const box = document.createElement('div');
            box.className = 'media-box';
            box.id = "item-" + item.id;
            box.setAttribute('data-name', item.name.toLowerCase());
            
            let mediaHtml = (item.type === 'photo') ? `<img src="${item.src}">` : `<video src="${item.src}" controls></video>`;
            
            box.innerHTML = `
                ${mediaHtml}
                <span class="file-name-display" id="name-${item.id}">${item.name}</span>
                <div class="admin-controls" style="display: ${isAdminActive ? 'block' : 'none'}">
                    <button class="btn-delete" onclick="deleteItem(${item.id})">Delete</button>
                    <button class="btn-rename" onclick="renameItem(${item.id})">Rename</button>
                </div>
            `;
            gallery.prepend(box);
        }

        function renameItem(id) {
            const newName = prompt("പുതിയ പേര് നൽകുക:");
            if (newName && newName.trim() !== "") {
                let list = JSON.parse(localStorage.getItem('naxora_data')) || [];
                const index = list.findIndex(i => i.id === id);
                if (index !== -1) {
                    list[index].name = newName;
                    localStorage.setItem('naxora_data', JSON.stringify(list));
                    
                    // UI അപ്ഡേറ്റ്
                    document.getElementById("name-" + id).innerText = newName;
                    document.getElementById("item-" + id).setAttribute('data-name', newName.toLowerCase());
                }
            }
        }

        function deleteItem(id) {
            if(confirm("Delete item?")) {
                let list = JSON.parse(localStorage.getItem('naxora_data')) || [];
                list = list.filter(i => i.id !== id);
                localStorage.setItem('naxora_data', JSON.stringify(list));
                document.getElementById("item-" + id).remove();
            }
        }

        function saveToStorage(item) {
            try {
                let list = JSON.parse(localStorage.getItem('naxora_data')) || [];
                list.push(item);
                localStorage.setItem('naxora_data', JSON.stringify(list));
            } catch (e) { alert("Storage full!"); }
        }

        function loadFromStorage() {
            let list = JSON.parse(localStorage.getItem('naxora_data')) || [];
            list.forEach(item => displayMedia(item));
        }

        function filterMedia(type) {
            const query = document.getElementById(type + 'Search').value.toLowerCase();
            const boxes = document.getElementById(type + 'Gallery').getElementsByClassName('media-box');
            for (let box of boxes) {
                box.style.display = box.getAttribute('data-name').includes(query) ? "block" : "none";
            }
        }
    </script>
</body>
